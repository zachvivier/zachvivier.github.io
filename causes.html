<!doctype html>
<html lang="en">
  <head>
    <script>document.documentElement.classList.add("js-fade")</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Causes — Zach Vivier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Lora:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background-color: #111009;
        color: #B8B09E;
        font-family: 'Lora', Georgia, serif;
        font-size: 17px;
        line-height: 1.8;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 96px 40px 120px;
      }
      .back {
        display: inline-block;
        font-size: 13px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #7A7060;
        text-decoration: none;
        margin-bottom: 64px;
        transition: color 0.2s ease;
      }
      .back:hover { color: #D8D2C4; }
      h1 {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 52px;
        font-weight: 700;
        color: #EDE8DF;
        line-height: 1.08;
        letter-spacing: -0.5px;
        margin-bottom: 12px;
      }
      .subtitle {
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #7A7060;
        margin-bottom: 52px;
      }
      .rule {
        width: 32px;
        height: 1px;
        background: #2E2A22;
        margin-bottom: 48px;
      }
      .cause {
        margin-bottom: 36px;
        padding-bottom: 36px;
        border-bottom: 1px solid #1E1C16;
      }
      .cause:last-child {
        border-bottom: none;
      }
      .cause-name {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 22px;
        font-weight: 700;
        color: #EDE8DF;
        margin-bottom: 8px;
      }
      .cause-desc {
        font-size: 16px;
        color: #B8B09E;
        margin-bottom: 14px;
      }
      .cause-link {
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #7A7060;
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .cause-link:hover { color: #D8D2C4; }
      @media (prefers-reduced-motion: no-preference) {
        html.js-fade body { opacity: 0; }
        html.js-fade body.page-ready { opacity: 1; transition: opacity 0.45s ease; }
        html.js-fade body.page-leaving { opacity: 0; transition: opacity 0.3s ease; }
      }
    </style>
  </head>
  <body>
    <main>
      <a href="index.html" class="back">← Back</a>

      <h1>Causes</h1>
      <p class="subtitle">Things worth supporting</p>
      <div class="rule"></div>

      <div class="cause">
        <div class="cause-name">MSPCA–Angell</div>
        <p class="cause-desc">
          The Massachusetts Society for the Prevention of Cruelty to Animals. Animal
          protection, adoption, and veterinary care for those who can't advocate for themselves.
        </p>
        <a href="https://www.mspca.org/donate-now/" target="_blank" rel="noopener noreferrer" class="cause-link">Donate →</a>
      </div>

      <!-- Add more causes here -->
    </main>
    <script>
      (function () {
        var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches;
        function ready() {
          if (!document.body) return;
          document.body.classList.remove("page-leaving");
          document.body.classList.add("page-ready");
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", ready);
        } else {
          ready();
        }
        window.addEventListener("pageshow", function (e) {
          if (e.persisted) ready();
        });
        if (reduce) return;
        document.addEventListener("click", function (e) {
          if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
          var a = e.target.closest ? e.target.closest("a[href]") : null;
          if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
          var u;
          try { u = new URL(a.href, location.href); } catch (x) { return; }
          if (u.origin !== location.origin || u.href === location.href) return;
          var h = a.getAttribute("href");
          if (h && h.charAt(0) === "#") return;
          e.preventDefault();
          document.body.classList.remove("page-ready");
          document.body.classList.add("page-leaving");
          setTimeout(function () { window.location.href = u.href; }, 300);
        });
      })();
    </script>
  </body>
</html>
